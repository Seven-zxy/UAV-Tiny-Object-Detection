# UAV-Tiny-Object-Detection — dataset configuration (TEMPLATE)
#
# The dataset itself is NOT included in this repository due to regulatory
# considerations regarding the specific plant species studied. This file is
# a template showing the expected structure; replace the paths with your own
# YOLO-format dataset to reproduce training.
#
# Expected directory layout (after running data_processing/split_dataset.py):
#   data/uav/
#     train/images/  train/labels/
#     val/images/    val/labels/
#     test/images/   test/labels/
#
# License: Apache-2.0

path: ./data/uav        # dataset root (relative to repo root)
train: train/images     # train images (relative to 'path')
val: val/images         # val images
test: test/images       # test images

nc: 1                   # number of classes
names: ['target']       # class name (neutralized; single-class detection)
