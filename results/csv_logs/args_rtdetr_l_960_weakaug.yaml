# Training configuration (sanitized): RT-DETR-L (960, weak-aug)
# Paths and machine-specific fields removed for public release.

model: rtdetr-l.pt
data: ./data/uav/data.yaml
epochs: 200
patience: 60
batch: 6
imgsz: 960
optimizer: AdamW
seed: 0
cos_lr: true
close_mosaic: 30
amp: false
lr0: 0.0003
lrf: 0.01
momentum: 0.937
weight_decay: 0.0001
warmup_epochs: 5
hsv_h: 0.015
hsv_s: 0.7
hsv_v: 0.4
degrees: 5
translate: 0.05
scale: 0.2
flipud: 0.5
fliplr: 0.5
mosaic: 0.2
mixup: 0.0
