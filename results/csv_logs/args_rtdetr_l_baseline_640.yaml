# Training configuration (sanitized): RT-DETR-L baseline (640)
# Paths and machine-specific fields removed for public release.

model: rtdetr-l.pt
data: ./data/uav/data.yaml
epochs: 200
patience: 50
batch: 12
imgsz: 640
optimizer: AdamW
seed: 0
cos_lr: true
close_mosaic: 10
amp: false
lr0: 0.0005
lrf: 0.01
momentum: 0.937
weight_decay: 0.0001
warmup_epochs: 3
hsv_h: 0.015
hsv_s: 0.7
hsv_v: 0.4
degrees: 10
translate: 0.1
scale: 0.3
flipud: 0.5
fliplr: 0.5
mosaic: 0.5
mixup: 0.0
